name: STARGLOW NOW - 収集とデプロイ

on:
  # 3時間ごとに最新情報を収集（UTC）
  schedule:
    - cron: '0 */3 * * *'
  # 手動実行ボタン
  workflow_dispatch:
  # フロントを変更したら即デプロイ
  push:
    branches:
      - main
      - claude/starglow-news-app-deploy-1ac4us
    paths:
      - 'docs/**'
      - 'collector/**'
      - '.github/workflows/starglow-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限
concurrency:
  group: starglow-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: コードの取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存インストール
        run: pip install -r collector/requirements.txt

      - name: 最新情報を収集（失敗してもサンプルで継続）
        run: python collector/collect.py || echo "collect failed, keeping existing feed.json"

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: 成果物アップロード（docs/）
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
